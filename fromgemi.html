<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu App</title>
    <style>
        /* Basic reset and responsive layout setup */
        body { font-family: sans-serif; margin: 0; background-color: #f8f9fa; }
        .container { max-width: 480px; margin: 0 auto; padding: 15px; background: #fff; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        
        /* Section Titles */
        .section-title { text-align: center; font-size: 1.5rem; margin: 20px 0 10px; position: relative; }
        .section-title::after { content: ''; display: block; width: 40px; height: 3px; background: #ffc107; margin: 5px auto; }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .grid-full { grid-template-columns: 1fr; } /* For full-width banner items */

        /* Card Component */
        .card { position: relative; border-radius: 12px; overflow: hidden; text-decoration: none; display: block; }
        .card img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .card-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.8)); 
            color: white; text-align: center; padding: 10px; font-weight: bold; 
        }
        
        /* Footer Contact & Socials */
        footer { text-align: center; margin-top: 30px; padding: 15px; border-top: 1px solid #eee; }
        .social-icons a { margin: 0 8px; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-left">
                <button>🛒 <span class="badge">0</span></button>
                <button>🌐</button>
            </div>
            <div class="logo"><strong>نعمة</strong></div>
            <div class="header-right">
                <button>🔍</button>
                <button>☰</button>
            </div>
        </header>

        <main>
            <h2 class="section-title">شرقي على أصوله</h2>
            <div class="grid">
                <a href="falafel.html" class="card">
                    <img src="falafel.jpg" alt="سندوتشات الفلافل">
                    <div class="card-overlay">سندوتشات الفلافل</div>
                </a>
                
                <a href="foul.html" class="card">
                    <img src="foul.jpg" alt="سندوتشات الفول">
                    <div class="card-overlay">سندوتشات الفول</div>
                </a>
            </div>

            <div class="grid grid-full">
                <a href="combos.html" class="card">
                    <img src="combo-box.jpg" alt="العلب والطلبات">
                    <div class="card-overlay">العلب والطلبات</div>
                </a>
            </div>

            <h2 class="section-title">المشويات والغربي</h2>
            <div class="grid">
                <a href="meat.html" class="card">
                    <img src="meat.jpg" alt="سندوتشات اللحوم">
                    <div class="card-overlay">سندوتشات اللحوم</div>
                </a>
                <a href="chicken.html" class="card">
                    <img src="chicken.jpg" alt="سندوتشات الفراخ">
                    <div class="card-overlay">سندوتشات الفراخ</div>
                </a>
            </div>
        </main>

        <footer>
            <div class="hotline">
                <p>الخط الساخن للطلبات</p>
                <a href="tel:01222740076">01222740076</a>
            </div>
            <div class="social-icons">
                <a href="#">🔵</a> <a href="#">📸</a> <a href="#">🎵</a> <a href="#">🟢</a> </div>
        </footer>
    </div>

</body>
</html>
